services:
  hashicorp.vault:
    image: ${DOCKER_REGISTRY-}hashicorp.vault:latest
    container_name: hashicorp.vault
    stdin_open: true
    tty: true
    build:
      context: ./src
      dockerfile: Hashicorp.Vault/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_ENVIRONMENT: Development
      HashiCorpVaultOptions__Address: https://host.docker.internal
    user: "0:0"

    cap_add:
      - NET_RAW
      - NET_ADMIN

    security_opt:
      - label=disable
